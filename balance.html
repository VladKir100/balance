<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="balance.css">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="all">
            <div class="myBalance">
                <div class="text">
                    <h4 style="align-self: flex-start; margin: 0 ;">My balance</h5>
                        <h1 style="align-self: flex-end; margin: 0;" id="balance-value">$1.48</h1>
                </div>
                <div class="logo">
                    <img style="width: 72px; height: 48px; align-self: center;" src="images/logo.svg" alt="">
                </div>
            </div>
            <div class="week">
                <h2 style="margin: 0;">Spending last 7 day</h2>
                <div class="ratings">
                    <div class="block1">

                        <div class="wrapper">
                            <div class="mon">
                                <div class="dollars">
                                    <p class="sum">1</p>
                                </div>
                            </div>
                        </div>
                        <p>mon</p>
                    </div>
                    <div class="block1">

                        <div class="wrapper">
                            <div class="mon">
                                <div class="dollars">
                                    <p class="sum">1</p>
                                </div>
                            </div>
                        </div>
                        <p>tue</p>
                    </div>
                    <div class="block1">

                        <div class="wrapper">
                            <div class="mon">
                                <div class="dollars">
                                    <p class="sum">1</p>
                                </div>
                            </div>
                        </div>
                        <p>wed</p>
                    </div>
                    <div class="block1">

                        <div class="wrapper">
                            <div class="mon">
                                <div class="dollars">
                                    <p class="sum">1</p>
                                </div>
                            </div>
                        </div>
                        <p>thu</p>
                    </div>
                    <div class="block1">

                        <div class="wrapper">
                            <div class="mon">
                                <div class="dollars">
                                    <p class="sum">1</p>
                                </div>
                            </div>
                        </div>
                        <p>fri</p>
                    </div>
                    <div class="block1">

                        <div class="wrapper">
                            <div class="mon">
                                <div class="dollars">
                                    <p class="sum">1</p>
                                </div>
                            </div>
                        </div>
                        <p>sat</p>
                    </div>
                    <div class="block1">

                        <div class="wrapper">
                            <div class="mon">
                                <div class="dollars">
                                    <p class="sum">1</p>
                                </div>
                            </div>
                        </div>
                        <p>sun</p>
                    </div>
                </div>
                <div class="line"></div>
                <div class="bottom">
                    <div class="total">
                        <p style="color: hsl(28, 10%, 53%);">Total this month</p>
                        <h1 id="thisMonth">$478.33</h1>
                    </div>
                    <div class="percent">
                        <p class="procent">+2.4%</p>
                        <p style="color: hsl(28, 10%, 53%);">from last month</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="balance.js"></script>
</body>

</html>
